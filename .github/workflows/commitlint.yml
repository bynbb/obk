name: Commit Lint

on: [push, pull_request]

jobs:
  commitlint:
    runs-on: self-hosted  # or 'ubuntu-latest'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Commitlint
        run: npm install --global @commitlint/{cli,config-conventional}

      - name: Lint PR commits
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            npx commitlint --from "$HEAD_SHA" --config commitlint.config.js
          else
            npx commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --config commitlint.config.js
          fi
        working-directory: ${{ github.workspace }}

      - name: Lint pushed commits
        if: github.event_name == 'push'
        run: |
          echo "From: ${{ github.event.before }}"
          echo "To:   ${{ github.sha }}"
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "No previous commit detected, skipping commitlint."
            exit 0
          else
            commitlint --from ${{ github.event.before }} --to ${{ github.sha }} --config commitlint.config.js
          fi
        working-directory: ${{ github.workspace }}
