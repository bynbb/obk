name: Commit Lint

on: [pull_request]

jobs:
  commitlint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Commitlint
        run: npm install --global @commitlint/{cli,config-conventional}

      - name: Lint commit messages
        run: |
          commitlint --from=HEAD~10 --to=HEAD --config .commitlint.config.js
