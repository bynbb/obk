name: Commit Lint

on: [push, pull_request]

jobs:
  commitlint:
    runs-on: self-hosted  # Or 'ubuntu-latest'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Commitlint
        run: npm install --global @commitlint/{cli,config-conventional}

      - name: Debug: print environment, working dir, and config location
        working-directory: ${{ github.workspace }}
        run: |
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
          pwd
          ls -l
          ls -l .commitlint.config.js || echo "Not in this dir"
          ls -l ../.commitlint.config.js || echo "Not in parent dir"
          ls -l ../../.commitlint.config.js || echo "Not in grandparent dir"

      - name: Lint PR commits
        if: github.event_name == 'pull_request'
        working-directory: ${{ github.workspace }}
        run: |
          echo "Base SHA: ${{ github.event.pull_request.base.sha }}"
          echo "Head SHA: ${{ github.event.pull_request.head.sha }}"
          commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --config .commitlint.config.js

      - name: Lint pushed commits
        if: github.event_name == 'push'
        working-directory: ${{ github.workspace }}
        run: |
          echo "From: ${{ github.event.before }}"
          echo "To:   ${{ github.sha }}"
          commitlint --from ${{ github.event.before }} --to ${{ github.sha }} --config .commitlint.config.js
